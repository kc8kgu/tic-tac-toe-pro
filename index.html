<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body class="theme-dark">
    <main class="app-shell">
    <h1>Tic Tac Toe</h1>

    <div class="top-bar" aria-label="Game settings">
        <div class="segmented mode-selector" role="group" aria-label="Game mode">
            <button id="ai-mode" class="theme-btn active" type="button" aria-pressed="true"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><rect x="7" y="8" width="10" height="9" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="10" cy="12" r="1.2" fill="currentColor"/><circle cx="14" cy="12" r="1.2" fill="currentColor"/><path d="M12 4v3M9 17v2M15 17v2M5 11h2M17 11h2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span> vs AI</button>
            <button id="pvp-mode" class="theme-btn" type="button" aria-pressed="false"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><circle cx="8" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.5 19c0-2.7 2-4.5 4.5-4.5S12.5 16.3 12.5 19M11.5 19c0-2.7 2-4.5 4.5-4.5s4.5 1.8 4.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span> 2 Player</button>
        </div>
        <div class="segmented theme-selector" role="group" aria-label="Theme">
            <button id="light-theme" class="theme-btn" type="button" aria-pressed="false"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2.5v2.5M12 19v2.5M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2.5 12H5M19 12h2.5M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span> Light</button>
            <button id="dark-theme" class="theme-btn active" type="button" aria-pressed="true"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M15.2 3.2A9 9 0 1 0 20.8 18 8 8 0 1 1 15.2 3.2Z" fill="currentColor"/></svg></span> Dark</button>
        </div>
    </div>

    <div class="board-container">
        <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
            <button class="cell" type="button" data-index="0" role="gridcell" aria-label="Cell 1, empty"></button>
            <button class="cell" type="button" data-index="1" role="gridcell" aria-label="Cell 2, empty"></button>
            <button class="cell" type="button" data-index="2" role="gridcell" aria-label="Cell 3, empty"></button>
            <button class="cell" type="button" data-index="3" role="gridcell" aria-label="Cell 4, empty"></button>
            <button class="cell" type="button" data-index="4" role="gridcell" aria-label="Cell 5, empty"></button>
            <button class="cell" type="button" data-index="5" role="gridcell" aria-label="Cell 6, empty"></button>
            <button class="cell" type="button" data-index="6" role="gridcell" aria-label="Cell 7, empty"></button>
            <button class="cell" type="button" data-index="7" role="gridcell" aria-label="Cell 8, empty"></button>
            <button class="cell" type="button" data-index="8" role="gridcell" aria-label="Cell 9, empty"></button>
        </div>
    </div>

    <p id="status" aria-live="polite">Player X's turn</p>

    <div class="game-controls" role="group" aria-label="Game controls">
        <button id="reset" class="btn reset-btn" type="button"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M20 12a8 8 0 1 1-2.3-5.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 4.5v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Reset Game</button>
        <button id="hint" class="btn hint-btn" type="button"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M9 18h6M10 21h4M8.5 14.5c-1.6-1.2-2.5-3-2.5-5a6 6 0 1 1 12 0c0 2-.9 3.8-2.5 5l-1 1.5h-5l-1-1.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Hint</button>
        <button id="sound-toggle" class="btn sound-btn" type="button" aria-label="Toggle sound" aria-pressed="true"><span class="sound-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M4 14h4l5 4V6L8 10H4Z" fill="currentColor"/><path d="M16 9a4 4 0 0 1 0 6M18.5 6.5a7.5 7.5 0 0 1 0 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></button>
    </div>

    <div class="score-board" aria-label="Scoreboard">
        <div class="player-score player-x active" id="x-score-box" data-player="X">
            <span class="player-label"><span id="x-label">Player X</span>:</span>
            <span class="score-value" id="x-score">0</span>
        </div>
        <div class="score-divider">VS</div>
        <div class="player-score player-o" id="o-score-box" data-player="O">
            <span class="player-label"><span id="o-label">Player O</span>:</span>
            <span class="score-value" id="o-score">0</span>
        </div>
    </div>

    <button id="reset-scores" class="btn reset-scores-btn" type="button"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M4 12a8 8 0 1 0 2.3-5.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 4.5v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Reset Scores</button>
    </main>

    <div id="win-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-message">
        <div class="modal-content">
            <div id="confetti" class="confetti"></div>
            <h2 id="modal-title">Player X Wins!</h2>
            <p id="modal-message">Congratulations on your victory!</p>
            <button id="close-modal" class="btn modal-btn" type="button"><span class="btn-icon" aria-hidden="true"><svg class="icon-svg" viewBox="0 0 24 24" focusable="false"><path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></span> Close</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
